<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoLeCul - Moklet Learning Culture</title>
    <meta name="description"
        content="MoLeCul - Platform pembelajaran budaya SMK Telkom Malang. Belajar menyenangkan dengan gamifikasi dan AI tutor.">
    <meta http-equiv="refresh" content="0; url=https://molecul.io">
    <link rel="canonical" href="https://molecul.io">

    <!-- Open Graph -->
    <meta property="og:title" content="MoLeCul - Moklet Learning Culture">
    <meta property="og:description"
        content="Platform pembelajaran budaya SMK Telkom Malang. Belajar menyenangkan dengan gamifikasi dan AI tutor.">
    <meta property="og:url" content="https://molecul.io">
    <meta property="og:type" content="website">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #fff;
            overflow: hidden;
        }

        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #667eea;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: #764ba2;
            bottom: -80px;
            right: -80px;
            animation-delay: -3s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: #f093fb;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        .container {
            text-align: center;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.35);
            animation: pulse 2s ease-in-out infinite;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .spinner-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .redirect-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.45);
        }

        a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 50px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        a:hover {
            background: rgba(102, 126, 234, 0.15);
            border-color: #667eea;
            transform: translateY(-1px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-30px);
            }
        }
    </style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <div class="logo-icon">🧬</div>
        <h1 class="logo">MoLeCul</h1>
        <p class="subtitle">Moklet Learning Culture Journey</p>
        <div class="spinner-wrap">
            <div class="spinner"></div>
            <span class="redirect-text">Mengalihkan ke molecul.io...</span>
        </div>
        <p><a href="https://molecul.io">Buka molecul.io →</a></p>
    </div>

    <script>
        window.location.replace("https://molecul.io");
    </script>
</body>

</html>
